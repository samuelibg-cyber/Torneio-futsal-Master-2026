<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Samuel Class</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<meta name="theme-color" content="#1e3a8a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Samuel Class"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<link rel="icon" type="image/png" href="icon.png"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--white:#ffffff;--dark:#0d1b2a;--dark2:#1a2e44;--mid:#2d4a6b;
  --blue:#2563eb;--blue2:#1d4ed8;--teal:#0d9488;--amber:#d97706;--red:#dc2626;--green:#16a34a;
  --purple:#7c3aed;--indigo:#4338ca;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --border:#e2e8f0;--bg2:#f8fafc;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --shadow2:0 8px 32px rgba(0,0,0,.12);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* SIDEBAR */
#sidebar{width:250px;min-height:100vh;background:linear-gradient(180deg,var(--dark) 0%,var(--dark2) 100%);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100%;z-index:100;transition:transform .3s;box-shadow:4px 0 24px rgba(0,0,0,.3)}
.side-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.side-logo-wrap{display:flex;gap:12px;align-items:center}
.side-logo{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:900;color:#fff;font-size:17px;letter-spacing:1px;flex-shrink:0}
.side-name{color:#f1f5f9;font-weight:700;font-size:14px;line-height:1.3}
.side-school{color:#64748b;font-size:11px;margin-top:2px}
.side-nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:10px 14px;border-radius:10px;border:none;background:transparent;color:#94a3b8;cursor:pointer;font-size:14px;text-align:left;position:relative;transition:all .18s;margin-bottom:3px;font-family:'DM Sans',sans-serif}
.nav-item:hover{background:rgba(255,255,255,.06);color:#cbd5e1}
.nav-item.active{background:rgba(37,99,235,.18);color:#60a5fa;font-weight:600}
.nav-item.active::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:2px;background:var(--blue)}
.nav-icon{font-size:18px;width:24px;text-align:center}
.side-foot{padding:16px 20px;border-top:1px solid rgba(255,255,255,.07);color:#475569;font-size:11px;text-align:center}

/* MAIN */
#main{margin-left:250px;flex:1;min-width:0;display:flex;flex-direction:column}
#topbar{position:sticky;top:0;z-index:50;background:rgba(240,244,248,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;gap:14px}
.menu-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);display:none;padding:4px}
.top-title{flex:1;font-family:'Playfair Display',serif;font-weight:700;font-size:19px;color:var(--dark)}
.top-date{color:var(--text3);font-size:13px}
#content{padding:24px;max-width:1140px;margin:0 auto;width:100%}

/* CARDS */
.card{background:var(--white);border-radius:16px;padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
.card-title{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--dark);margin-bottom:16px}
.empty{color:var(--text3);text-align:center;padding:28px 0;font-size:14px}

/* GRID */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--white);border-radius:14px;padding:20px;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--blue)}
.stat-val{font-family:'Playfair Display',serif;font-size:38px;font-weight:900;line-height:1;margin:8px 0 4px}
.stat-lbl{color:var(--text3);font-size:12px;font-weight:500}

/* WELCOME */
.welcome{background:linear-gradient(135deg,#0d1b2a 0%,#1e3a8a 50%,#5b21b6 100%);border-radius:18px;padding:26px 30px;color:#fff;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.welcome-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;margin-bottom:5px}
.welcome-sub{color:rgba(255,255,255,.7);font-size:14px}
.welcome-badge{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:7px 18px;font-size:14px;font-weight:600;backdrop-filter:blur(4px)}

/* QUICK ACTIONS */
.quick-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px}
.q-btn{border:none;border-radius:10px;padding:10px 18px;cursor:pointer;font-weight:600;font-size:14px;transition:all .18s;font-family:'DM Sans',sans-serif}
.q-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.35)}
.q-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.45)}
.q-secondary{background:var(--white);color:var(--text2);border:1px solid var(--border)}
.q-secondary:hover{background:var(--bg2)}

/* BADGES */
.badge-ef{background:#d1fae5;color:#065f46;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700}
.badge-ia{background:#ede9fe;color:#5b21b6;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700}
.badge-prat{background:#dbeafe;color:#1d4ed8;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600}
.badge-teor{background:#f1f5f9;color:#374151;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600}
.badge-aval{background:#fef3c7;color:#92400e;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:2px solid var(--border)}
.tab{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;padding:9px 20px;cursor:pointer;font-weight:600;font-size:14px;color:var(--text3);font-family:'DM Sans',sans-serif;transition:all .18s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* FORMS */
input,select,textarea{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:9px 13px;font-size:14px;outline:none;background:var(--white);font-family:'DM Sans',sans-serif;color:var(--text);transition:border-color .18s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
label{display:block;font-weight:600;font-size:13px;margin-bottom:5px;color:var(--text2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.form-group{margin-bottom:14px}

/* BUTTONS */
.btn{border:none;border-radius:9px;padding:9px 20px;font-weight:700;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(37,99,235,.35)}
.btn-outline{background:var(--white);color:var(--text2);border:1.5px solid var(--border)}
.btn-outline:hover{background:var(--bg2)}
.btn-sm{padding:6px 14px;font-size:13px}

/* PROGRESS */
.progress-bar{height:7px;border-radius:4px;background:var(--border);overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px;transition:width .5s}

/* ALUNO CARD */
.aluno-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.aluno-card{background:var(--bg2);border-radius:13px;padding:15px;cursor:pointer;border:1.5px solid var(--border);transition:all .18s}
.aluno-card:hover{border-color:var(--blue);box-shadow:0 4px 14px rgba(37,99,235,.1)}
.aluno-nome{font-weight:700;font-size:14px;margin-bottom:3px}
.aluno-num{color:var(--text3);font-weight:400}
.aluno-stats{display:flex;gap:12px;font-size:12px;color:var(--text3);margin:8px 0 6px}

/* AULA CARD */
.aula-card{background:var(--white);border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.aula-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;gap:8px;flex-wrap:wrap}
.aula-head:hover{background:var(--bg2)}
.aula-body{padding:0 18px 18px;border-top:1px solid var(--border)}

/* ENTREGA */
.entrega-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:6px;margin-top:10px}
.entrega-item{display:flex;gap:8px;align-items:center;padding:7px 11px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:13px;transition:all .15s;user-select:none}
.entrega-item:hover{border-color:var(--teal)}
.entrega-item.entregou{background:#d1fae5;border-color:#6ee7b7}

/* CALENDAR */
.cal-wrap{background:var(--white);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:18px}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cal-nav{background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;padding:6px 16px;cursor:pointer;font-size:18px;color:var(--text2)}
.cal-month{font-family:'Playfair Display',serif;font-weight:700;font-size:20px;color:var(--dark)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-lbl{text-align:center;font-weight:700;font-size:11px;color:var(--text3);padding:4px 0;text-transform:uppercase}
.cal-day{min-height:64px;border-radius:10px;padding:6px 8px;cursor:pointer;background:var(--bg2);border:1.5px solid transparent;transition:all .15s;display:flex;flex-direction:column;gap:2px}
.cal-day:hover{border-color:var(--blue);background:#eff6ff}
.cal-day.hoje{background:#dbeafe;border-color:var(--blue)}
.cal-day.selecionado{background:#eff6ff;border-color:var(--blue);box-shadow:0 0 0 2px #bfdbfe}
.cal-day.feriado{background:#fffbeb;border-color:#fcd34d}
.cal-day-num{font-weight:700;font-size:13px;color:var(--text)}
.cal-dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.cal-dot{width:7px;height:7px;border-radius:50%}

/* TIMELINE */
.timeline-item{display:flex;gap:14px;margin-bottom:18px;align-items:flex-start}
.timeline-dot{width:14px;height:14px;border-radius:50%;background:var(--blue);margin-top:3px;flex-shrink:0}
.timeline-date{font-weight:600;font-size:13px;color:var(--blue)}
.timeline-cont{font-weight:700;font-size:14px;color:var(--dark)}
.timeline-sub{color:var(--text3);font-size:12px;margin-top:2px}

/* ALERT */
.alert-item{background:#fffbeb;border:1px solid #fcd34d;border-radius:9px;padding:10px 14px;margin-bottom:8px;color:#92400e;font-size:13px}
.alert-sug{background:#eff6ff;border:1px solid #93c5fd;border-radius:9px;padding:10px 14px;margin-bottom:14px;color:#1e40af;font-size:13px}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(13,27,42,.65);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-backdrop.open{display:flex}
.modal{background:var(--white);border-radius:20px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.25)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 26px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Playfair Display',serif;font-weight:700;font-size:18px}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1}
.modal-body{padding:22px 26px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 26px;border-top:1px solid var(--border)}

/* RELATÓRIO */
.rel-preview{background:var(--white);border-radius:16px;padding:36px;box-shadow:var(--shadow2);margin-top:18px;font-family:'DM Sans',sans-serif}
.rel-cab{text-align:center;margin-bottom:28px;padding-bottom:22px;border-bottom:2px solid var(--dark2)}
.rel-escola{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text3)}
.rel-titulo{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--dark2);margin:8px 0 4px}
.rel-sub{font-size:14px;color:var(--text2);margin-top:4px}
.rel-section{margin-bottom:26px}
.rel-sec-title{font-size:12px;font-weight:800;color:var(--dark2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;padding-bottom:6px;border-bottom:1.5px solid var(--border)}
.rel-table{width:100%;border-collapse:collapse;font-size:13px}
.rel-table th{padding:10px 13px;text-align:left;font-weight:700;border-bottom:2px solid var(--border);color:var(--dark);background:var(--bg2)}
.rel-table td{padding:9px 13px;border-bottom:1px solid var(--border);color:var(--text2)}
.rel-foot{text-align:center;margin-top:26px;padding-top:18px;border-top:1px solid var(--border);color:var(--text3);font-size:12px}

/* TURMA BTN */
.turma-btn{display:flex;justify-content:space-between;align-items:center;width:100%;padding:9px 13px;border:none;border-radius:9px;background:transparent;cursor:pointer;font-size:13px;color:var(--text2);text-align:left;margin-bottom:4px;font-family:'DM Sans',sans-serif;transition:all .18s}
.turma-btn:hover{background:var(--bg2)}
.turma-btn.active{background:#eff6ff;color:var(--blue);font-weight:700}
.turma-badge{background:var(--bg2);border-radius:12px;padding:2px 9px;font-size:11px;font-weight:600;color:var(--text3)}

/* TOAST */
#toast{position:fixed;bottom:26px;right:26px;z-index:999;background:var(--dark);color:#fff;border-radius:13px;padding:13px 22px;font-weight:600;font-size:14px;box-shadow:0 8px 28px rgba(0,0,0,.25);display:none;animation:slideUp .3s}
#toast.show{display:block}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* PLAN GRID */
.plan-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:16px 0}
.plan-day{background:var(--bg2);border-radius:11px;padding:14px}
.plan-day-title{font-weight:700;font-size:13px;color:var(--dark);margin-bottom:8px}
.plan-day textarea{min-height:90px;resize:vertical}

/* CONFIG */
.config-group{margin-bottom:18px}

/* AULA ITEM */
.aula-item-row{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border)}

/* PERF INDICATOR */
.perf{border-radius:7px;padding:3px 9px;font-size:12px;font-weight:700}
.perf.green{background:#d1fae5;color:#065f46}
.perf.yellow{background:#fef3c7;color:#92400e}
.perf.red{background:#fee2e2;color:#991b1b}

/* ATIV SECTION */
.ativ-section{background:var(--bg2);border-radius:12px;padding:16px;margin-top:14px}
.ativ-item-preview{font-size:13px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border)}
.add-ativ-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:flex-end}
.add-ativ-row input,.add-ativ-row select{flex:1;min-width:120px}

/* PROFILE */
.aluno-profile-head{display:flex;gap:18px;align-items:center;margin-bottom:22px}
.aluno-avatar{width:58px;height:58px;border-radius:15px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:26px;color:#fff;font-weight:900;flex-shrink:0}

/* LEGEND */
.legend-row{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px}
.legend-item{display:flex;gap:6px;align-items:center;font-size:13px;color:var(--text2)}

/* RESPONSIVE */
@media(max-width:820px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .menu-btn{display:block!important}
  .stats-grid{grid-template-columns:1fr 1fr}
  .row2{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .plan-grid{grid-template-columns:1fr 1fr}
  #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
  #overlay.open{display:block}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .plan-grid{grid-template-columns:1fr}
  #content{padding:14px}
}
@media print{
  #sidebar,#topbar,.quick-actions,.tabs,.btn,button{display:none!important}
  #main{margin-left:0!important}
  .rel-preview{box-shadow:none;border:1px solid #ccc}
}
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="side-head">
    <div class="side-logo-wrap">
      <div class="side-logo">SO</div>
      <div>
        <div class="side-name">Samuel Oliveira</div>
        <div class="side-school">CETI Polivalente</div>
      </div>
    </div>
  </div>
  <nav class="side-nav">
    <button class="nav-item active" onclick="goPage('home',this)"><span class="nav-icon">⊞</span> Home</button>
    <button class="nav-item" onclick="goPage('turmas',this)"><span class="nav-icon">👥</span> Turmas & Alunos</button>
    <button class="nav-item" onclick="goPage('aulas',this)"><span class="nav-icon">📚</span> Aulas</button>
    <button class="nav-item" onclick="goPage('calendario',this)"><span class="nav-icon">📅</span> Calendário</button>
    <button class="nav-item" onclick="goPage('planejamento',this)"><span class="nav-icon">📊</span> Planejamento</button>
    <button class="nav-item" onclick="goPage('relatorios',this)"><span class="nav-icon">📄</span> Relatórios</button>
    <button class="nav-item" onclick="goPage('config',this)"><span class="nav-icon">⚙️</span> Configurações</button>
  </nav>
  <div class="side-foot">v1.0 • CETI Polivalente • 2026</div>
</aside>

<div id="main">
  <header id="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="top-title" id="top-title">SAMclass</div>
    <div class="top-date" id="top-date"></div>
    <div id="user-info" style="display:none">
      <img id="user-avatar" src="" alt=""/>
      <span id="user-name"></span>
      <button id="btn-logout" onclick="logout()">Sair</button>
    </div>
    <div id="user-info" style="display:none">
      <img id="user-avatar" src="" alt="" onerror="this.style.display='none'"/>
      <span id="user-name"></span>
      <button id="btn-logout" onclick="logout()">Sair</button>
    </div>
    <div id="gd-bar" style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span id="gd-status" style="font-size:11px;display:none" class="top-date"></span>
      <button class="btn btn-sm" style="background:linear-gradient(135deg,#4285f4,#34a853);color:#fff;border:none;font-size:12px;padding:6px 14px;display:inline-flex;align-items:center;gap:5px" onclick="gasSalvar()">
        ☁️ Salvar
      </button>
      <button class="btn btn-sm btn-outline" style="font-size:12px;padding:6px 12px" onclick="gasCarregar()">🔄 Carregar</button>
    </div>
  </header>
  <div id="content"></div>
</div>

<!-- MODAL AULA -->
<div class="modal-backdrop" id="modal-aula">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">📝 Registrar Nova Aula</div>
      <button class="modal-close" onclick="closeModal('modal-aula')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Data</label><input type="date" id="aula-data"/></div>
        <div class="form-group"><label>Tipo</label>
          <select id="aula-tipo"><option>Teórica</option><option>Prática</option><option>Avaliação</option></select>
        </div>
        <div class="form-group"><label>Disciplina</label>
          <select id="aula-disc"><option>Educação Física</option><option>Inteligência Artificial</option></select>
        </div>
        <div class="form-group"><label>Turma</label><select id="aula-turma"></select></div>
      </div>
      <div class="form-group"><label>Conteúdo ministrado</label><input type="text" id="aula-conteudo" placeholder="Descreva o conteúdo da aula..."/></div>
      <div class="ativ-section">
        <div class="card-title" style="margin-bottom:10px">Atividades</div>
        <div id="atividades-list"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">

// ─── UTILS ───────────────────────────────────────────────────────────────────
function hoje(){ return new Date().toISOString().split("T")[0]; }
function fmtData(d){ if(!d)return""; const[y,m,dd]=d.split("-"); return`${dd}/${m}/${y}`; }
function diaSemana(d){ return DIAS_SEMANA[new Date(d+"T12:00:00").getDay()]; }
function uid(){ return Date.now()+Math.floor(Math.random()*10000); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function getAlunoStats(alunoId, turma){
  const aulasT = state.aulas.filter(a=>a.turma===turma);
  let total=0,entregues=0;
  aulasT.forEach(aula=>{
    (aula.atividades||[]).forEach(at=>{
      total++;
      if(state.entregas[`${aula.id}_${at.id}_${alunoId}`]) entregues++;
    });
  });
  return {total,entregues,pct:total?Math.round((entregues/total)*100):0};
}

function getPts(alunoId){
  let pts=0;
  state.aulas.forEach(aula=>{
    (aula.atividades||[]).forEach(at=>{
      const key=`${aula.id}_${at.id}_${alunoId}`;
      if(state.entregas[key]){
        const meta=state.entregasMeta?.[key];
        pts+=meta?.nota!=null?Number(meta.nota):Number(at.pontos)||0;
      }
    });
  });
  return pts;
}

function perfClass(pct){ return pct>=75?"green":pct>=50?"yellow":"red"; }
function perfLabel(pct){ return pct>=75?"🟢 Bom":pct>=50?"🟡 Médio":"🔴 Baixo"; }

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="show";
  setTimeout(()=>t.className="",3200);
}

  state.currentPage=page;
  document.querySelectorAll(".nav-item").forEach(b=>b.classList.remove("active"));

function toggleSidebar(){ document.getElementById("sidebar").classList.toggle("open"); document.getElementById("overlay").classList.toggle("open"); }
function closeSidebar(){ document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("open"); }

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(id){ document.getElementById(id).classList.add("open"); }
function closeModal(id){ document.getElementById(id).classList.remove("open"); }

function openModalAula(){
  state.atividadesTemp=[];
  document.getElementById("aula-data").value=hoje();
  // populate turma select
  const sel=document.getElementById("aula-turma");
  sel.innerHTML=TURMAS.map(t=>`<option>${esc(t)}</option>`).join("");
  renderAtivTemp();
  openModal("modal-aula");
}

function addAtivTemp(){
  const nome=document.getElementById("ativ-nome").value.trim();
  if(!nome){showToast("Informe o nome da atividade");return;}
  const prazo=document.getElementById("ativ-prazo").value;
  const ptsDia=Number(document.getElementById("ativ-pts-dia").value)||3;
  const ptsPrazo=Number(document.getElementById("ativ-pts-prazo").value)||2;
  const ptsAtraso=Number(document.getElementById("ativ-pts-atraso").value)||1;
  state.atividadesTemp.push({
    id:uid(),
    nome,
    tipo:document.getElementById("ativ-tipo").value,
    prazo,
    ptsDia,
    ptsPrazo,
    ptsAtraso,
    pontos:ptsPrazo // pontos padrão = no prazo
  });
  document.getElementById("ativ-nome").value="";
  document.getElementById("ativ-prazo").value="";
  renderAtivTemp();
}

function renderAtivTemp(){
  document.getElementById("atividades-list").innerHTML=state.atividadesTemp.map(a=>`
    <div class="ativ-item-preview" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
      <div>
        <span style="font-weight:700">✅ ${esc(a.nome)}</span>
        <span style="color:#64748b;font-size:12px"> · ${esc(a.tipo)}</span>
        ${a.prazo?`<span style="color:#2563eb;font-size:12px"> · Prazo: ${fmtData(a.prazo)}</span>`:""}
      </div>
      <div style="display:flex;gap:6px;font-size:11px;font-weight:700">
        <span style="background:#d1fae5;color:#065f46;padding:2px 7px;border-radius:5px">🟢 ${a.ptsDia||3}pts</span>
        <span style="background:#dbeafe;color:#1d4ed8;padding:2px 7px;border-radius:5px">🔵 ${a.ptsPrazo||2}pts</span>
        <span style="background:#fee2e2;color:#991b1b;padding:2px 7px;border-radius:5px">🔴 ${a.ptsAtraso||1}pts</span>
      </div>
    </div>`).join("")||"<div style='color:#94a3b8;font-size:13px;margin-bottom:8px'>Nenhuma atividade adicionada ainda.</div>";
}

function salvarAula(){
  const data=document.getElementById("aula-data").value;
  const turma=document.getElementById("aula-turma").value;
  const disciplina=document.getElementById("aula-disc").value;
  const tipo=document.getElementById("aula-tipo").value;
  const conteudo=document.getElementById("aula-conteudo").value.trim();
  if(!conteudo){showToast("Informe o conteúdo da aula");return;}

  // anti-repetição
  const repetido=state.aulas.find(a=>a.turma===turma && a.conteudo.toLowerCase()===conteudo.toLowerCase());
  if(repetido && !confirm(`⚠️ Esse conteúdo já foi registrado para ${turma} em ${fmtData(repetido.data)}.\n\nDeseja continuar mesmo assim?`)) return;

  state.aulas.push({id:uid(),data,turma,disciplina,tipo,conteudo,atividades:[...state.atividadesTemp]});
  document.getElementById("aula-conteudo").value="";
  state.atividadesTemp=[];
  closeModal("modal-aula");
  showToast("✅ Aula registrada com sucesso!");
  renderPage(state.currentPage);
  autoSave();
}

// ─── RENDER PAGES ────────────────────────────────────────────────────────────
function renderPage(page){
  const c=document.getElementById("content");
  const renders={home:renderDashboard,turmas:renderTurmas,aulas:renderAulas,calendario:renderCalendario,planejamento:renderPlanejamento,relatorios:renderRelatorios,config:renderConfig};
  c.innerHTML=(renders[page]||renderDashboard)();
  bindEvents(page);
}

function renderDashboard(){
  const aulasHoje=state.aulas.filter(a=>a.data===hoje());
  const totalAlunos=Object.values(state.alunos).reduce((s,a)=>s+a.length,0);
  const totalAtiv=state.aulas.reduce((s,a)=>s+(a.atividades?.length||0),0);
  const totalEntregas=Object.values(state.entregas).filter(Boolean).length;
  const recentes=[...state.aulas].sort((a,b)=>b.data.localeCompare(a.data)).slice(0,6);

  // ── alertas gerais ──
  const alerts=[];
  TURMAS.forEach(t=>{
    const aulasT=state.aulas.filter(a=>a.turma===t);
    if(!aulasT.length) return;
    const ultima=aulasT.map(a=>a.data).sort().at(-1);
    const diff=Math.floor((new Date()-new Date(ultima+"T12:00:00"))/(86400000));
    if(diff>10) alerts.push({tipo:"turma",msg:`Turma <strong>${esc(t)}</strong> sem registro há ${diff} dias`});
  });

  // ── alertas de prazo ──
  const alertasPrazo=[];
  const amanha = new Date(); amanha.setDate(amanha.getDate()+1);
  const amanhaStr = amanha.toISOString().split("T")[0];

  state.aulas.forEach(aula=>{
    (aula.atividades||[]).forEach(at=>{
      if(!at.prazo) return;
      const alunosT = state.alunos[aula.turma]||[];
      // contar quantos ainda não entregaram
      const pendentes = alunosT.filter(al=>!state.entregas[`${aula.id}_${at.id}_${al.id}`]).length;
      if(pendentes===0) return; // todos entregaram
      if(at.prazo===hoje()){
        alertasPrazo.push({
          tipo:"hoje",
          atividade:at.nome,
          turma:aula.turma,
          disciplina:aula.disciplina,
          conteudo:aula.conteudo,
          pendentes,
          total:alunosT.length
        });
      } else if(at.prazo===amanhaStr){
        alertasPrazo.push({
          tipo:"amanha",
          atividade:at.nome,
          turma:aula.turma,
          disciplina:aula.disciplina,
          conteudo:aula.conteudo,
          pendentes,
          total:alunosT.length
        });
      } else if(at.prazo<hoje()){
        alertasPrazo.push({
          tipo:"vencida",
          atividade:at.nome,
          turma:aula.turma,
          disciplina:aula.disciplina,
          conteudo:aula.conteudo,
          pendentes,
          total:alunosT.length,
          prazo:at.prazo
        });
      }
    });
  });

  // desempenho por turma
  const desempTurmas = TURMAS.map(t=>{
    const als=state.alunos[t]||[];
    if(!als.length) return null;
    const totalAts=state.aulas.filter(a=>a.turma===t).reduce((s,a)=>s+(a.atividades?.length||0),0);
    const entregues=als.reduce((s,al)=>{
      let e=0;
      state.aulas.filter(a=>a.turma===t).forEach(a=>(a.atividades||[]).forEach(at=>{ if(state.entregas[`${a.id}_${at.id}_${al.id}`]) e++; }));
      return s+e;
    },0);
    const possivel=als.length*totalAts;
    const pct=possivel?Math.round((entregues/possivel)*100):0;
    return {turma:t,alunos:als.length,pct,entregues,possivel};
  }).filter(Boolean);

  // ranking alunos top 10
  const ranking=[];
  TURMAS.forEach(t=>{
    (state.alunos[t]||[]).forEach(al=>{
      ranking.push({nome:al.nome,turma:t,pts:getPts(al.id),id:al.id});

    ${alertasPrazo.map(a=>{

      const label=a.tipo==="hoje"?"🔴 ENCERRA HOJE":a.tipo==="amanha"?"🟡 Encerra amanhã":`🟣 Vencida em ${fmtData(a.prazo)}`;
      return `<div style="background:${bg};border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:4px solid ${cor}">

// ─── TURMAS ──────────────────────────────────────────────────────────────────
function renderTurmas(){
  const turma=state.selectedTurma;
  const disc=state.discLayout;
  const alunosTurma=state.alunos[turma]||[];
  const aulasT=[...state.aulas.filter(a=>a.turma===turma && a.disciplina===disc)].sort((a,b)=>b.data.localeCompare(a.data));
  const aulaAtiva=state.turmAulaAtiva||null;
  const atAtiva=state.turmAtAtiva||null;

  // build activity selector HTML
  let atividadesSel="";
  if(aulasT.length>0){
    atividadesSel=`
    <div style="background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:12px;padding:14px;margin-bottom:16px">
      <div style="font-weight:700;font-size:13px;color:#1d4ed8;margin-bottom:10px">📝 Selecione a atividade para registrar entregas:</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${aulasT.flatMap(a=>(a.atividades||[]).map(at=>{
          const isSel=Number(aulaAtiva)===Number(a.id)&&Number(atAtiva)===Number(at.id);
          const entregues=(alunosTurma).filter(al=>state.entregas[`${a.id}_${at.id}_${al.id}`]).length;
          return `<div style="display:flex;align-items:center;gap:6px">
            <button style="display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:9px;border:1.5px solid ${isSel?"#3b82f6":"#e2e8f0"};background:${isSel?"#dbeafe":"#fff"};cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;flex:1" onclick="selecionarAtivTurma(${a.id},${at.id},event)">
              <span style="font-size:18px">${isSel?"🎯":"📋"}</span>
              <div style="flex:1">
                <div style="font-weight:700;font-size:13px;color:#1e293b">${esc(at.nome)}</div>
                <div style="font-size:11px;color:#64748b">${fmtData(a.data)} · ${esc(a.conteudo).substring(0,40)}${a.conteudo.length>40?"...":""} · 🏅 ${at.pontos} pts${at.prazo?" · 📅 "+fmtData(at.prazo):""}</div>
              </div>
              <span style="background:#e0f2fe;color:#0369a1;border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700;flex-shrink:0">${entregues}/${alunosTurma.length} ✔</span>
            </button>
            <button onclick="excluirAtividade('${a.id}','${at.id}',event)" style="background:#fee2e2;border:none;border-radius:8px;padding:8px 10px;cursor:pointer;color:#dc2626;font-size:14px;flex-shrink:0" title="Excluir atividade">🗑️</button>
          </div>`;
        })).join("")}
      </div>
    </div>`;
  }

  return `
  <div style="display:flex;gap:6px;margin-bottom:18px">
    ${DISCIPLINAS.map(d=>`<button class="tab ${state.discLayout===d?"active":""}" onclick="setDiscLayout('${esc(d)}')">${d==="Educação Física"?"🏃 Educação Física":"🤖 Inteligência Artificial"}</button>`).join("")}
  </div>
  <div style="display:grid;grid-template-columns:230px 1fr;gap:18px">
    <div class="card" style="margin-bottom:0;padding:16px">
      <div class="card-title">Turmas</div>
      ${TURMAS.map(t=>`<button class="turma-btn ${t===turma?"active":""}" onclick="setTurmaLayout('${esc(t)}')">${esc(t)}<span class="turma-badge">${state.alunos[t]?.length||0}</span></button>`).join("")}
    </div>
    <div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px">
          <div class="card-title" style="margin:0">${esc(turma)} — ${alunosTurma.length} alunos</div>
          <button class="btn btn-primary btn-sm" onclick="toggleAddAluno()">+ Adicionar Aluno</button>
        </div>
        <div id="add-aluno-form" style="display:none;background:#f8fafc;border-radius:12px;padding:16px;margin-bottom:16px">
          <div class="form-group"><label>Nome completo *</label><input id="al-nome" placeholder="Nome completo"/></div>
          <div class="form-grid">
            <div class="form-group"><label>Nº Chamada</label><input id="al-num" placeholder="Ex: 12"/></div>
            <div class="form-group"><label>Observações</label><input id="al-obs" placeholder="Opcional"/></div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="salvarAluno()">Salvar Aluno</button>
            <button class="btn btn-outline btn-sm" onclick="toggleAddAluno()">Cancelar</button>
          </div>
        </div>

        ${aulasT.length===0?`<div class="alert-item">📚 Nenhuma aula de <strong>${esc(disc)}</strong> registrada para ${esc(turma)} ainda.</div>`:atividadesSel}

        ${aulaAtiva&&atAtiva?`
        <div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:14px;margin-bottom:16px">
          <div style="font-weight:700;font-size:13px;color:#15803d;margin-bottom:4px">✅ Registrando entregas — clique no aluno para marcar/desmarcar</div>
          <div style="font-size:12px;color:#16a34a">Toque ✔/❌ para alternar. Ao marcar ✔ você define a nota e data.</div>
        </div>`:""}

        <input style="margin-bottom:16px" placeholder="🔍 Buscar aluno..." oninput="filtrarAlunos(this.value)" id="busca-aluno"/>
        <div class="aluno-grid" id="aluno-grid">
          ${renderAlunoCards(alunosTurma,turma,aulaAtiva,atAtiva)}
        </div>
      </div>
    </div>
  </div>`;
}

function renderAlunoCards(lista, turma, aulaAtiva, atAtiva){
  if(!lista.length) return '<div class="empty" style="grid-column:1/-1">Nenhum aluno cadastrado. Clique em "+ Adicionar Aluno"</div>';
  return lista.map(al=>{
    const stats=getAlunoStats(al.id,turma);
    const pts=getPts(al.id);
    const pc=perfClass(stats.pct);
    const cor=pc==="green"?"#16a34a":pc==="yellow"?"#d97706":"#dc2626";

    // entrega mode
    if(aulaAtiva&&atAtiva){
      const key=`${aulaAtiva}_${atAtiva}_${al.id}`;
      const entregou=state.entregas[key];
      const meta=state.entregasMeta?.[key];
      return `<div class="aluno-card" style="cursor:pointer;border-color:${entregou?"#86efac":"#e2e8f0"};background:${entregou?"#f0fdf4":"#fff"}" onclick="toggleEntrega('${aulaAtiva}','${atAtiva}','${al.id}','${esc(turma)}',2)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div class="aluno-nome" style="font-size:13px">${al.numero?`<span class="aluno-num">#${esc(al.numero)} </span>`:""}${esc(al.nome)}</div>
          <span style="font-size:24px;line-height:1">${entregou?"✅":"⬜"}</span>
        </div>
        ${entregou
          ?`<div style="font-size:12px;color:#15803d;font-weight:600">🏅 ${meta?.nota??""} pts${meta?.data?" · "+fmtData(meta.data):""}</div>`
          :`<div style="font-size:12px;color:#94a3b8">Toque para registrar entrega</div>`
        }
      </div>`;
    }

    // normal mode
    return `<div class="aluno-card" onclick="openPerfilAluno(${al.id},'${esc(turma)}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div class="aluno-nome">${al.numero?`<span class="aluno-num">#${esc(al.numero)} </span>`:""}${esc(al.nome)}</div>${al.obs?`<div style="color:#94a3b8;font-size:12px;margin-top:2px">${esc(al.obs)}</div>`:""}</div>
        <span class="perf ${pc}">${perfLabel(stats.pct)}</span>
      </div>
      <div class="aluno-stats"><span>🏅 ${pts} pts</span><span>📦 ${stats.entregues}/${stats.total}</span><span style="font-weight:700;color:${cor}">${stats.pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${stats.pct}%;background:${cor}"></div></div>
    </div>`;
  }).join("");
}

function selecionarAtivTurma(aulaId,atId,ev){
  if(ev) ev.stopPropagation();
  if(state.turmAulaAtiva==aulaId&&state.turmAtAtiva==atId){
    state.turmAulaAtiva=null; state.turmAtAtiva=null;
  } else {
    state.turmAulaAtiva=Number(aulaId); state.turmAtAtiva=Number(atId);
  }
  renderPage("turmas");
}

function setDiscLayout(d){ state.discLayout=d; state.turmAulaAtiva=null; state.turmAtAtiva=null; renderPage("turmas"); }
function setTurmaLayout(t){ state.selectedTurma=t; state.turmAulaAtiva=null; state.turmAtAtiva=null; renderPage("turmas"); }
function toggleAddAluno(){ const f=document.getElementById("add-aluno-form"); f.style.display=f.style.display==="none"?"block":"none"; }

function salvarAluno(){
  const nome=document.getElementById("al-nome").value.trim();
  if(!nome){showToast("Informe o nome do aluno");return;}
  const turma=state.selectedTurma;
  state.alunos[turma].push({id:uid(),nome,numero:document.getElementById("al-num").value.trim(),obs:document.getElementById("al-obs").value.trim()});
  showToast("✅ Aluno adicionado com sucesso!");
  renderPage("turmas");
}

function filtrarAlunos(busca){
  const turma=state.selectedTurma;
  const lista=(state.alunos[turma]||[]).filter(a=>a.nome.toLowerCase().includes(busca.toLowerCase())||(a.numero||"").includes(busca));
  document.getElementById("aluno-grid").innerHTML=renderAlunoCards(lista,turma,state.turmAulaAtiva,state.turmAtAtiva);
}

function openPerfilAluno(alunoId, turma){
  const al=state.alunos[turma]?.find(a=>a.id===alunoId);
  if(!al) return;
  const stats=getAlunoStats(al.id,turma);
  const pts=getPts(al.id);
  const pc=perfClass(stats.pct);
  const aulasT=[...state.aulas.filter(a=>a.turma===turma)].sort((a,b)=>b.data.localeCompare(a.data));

  document.getElementById("modal-aluno-title").innerHTML=`👤 ${esc(al.nome)}`;
  document.getElementById("modal-aluno-body").innerHTML=`
    <div class="aluno-profile-head">
      <div class="aluno-avatar">${al.nome.charAt(0).toUpperCase()}</div>
      <div>
        <div style="font-weight:700;font-size:17px">${esc(al.nome)}</div>
        <div style="color:#64748b">${esc(turma)}${al.numero?" · Chamada #"+esc(al.numero):""}</div>
        ${al.obs?`<div style="color:#94a3b8;font-size:13px;margin-top:3px">${esc(al.obs)}</div>`:""}
      </div>
    </div>
    <div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:14px">
      <div class="stat-card" style="border-top-color:#7c3aed;padding:14px"><div class="stat-val" style="color:#7c3aed;font-size:28px">${pts}</div><div class="stat-lbl">Pontos</div></div>
      <div class="stat-card" style="border-top-color:${pc==="green"?"#16a34a":pc==="yellow"?"#d97706":"#dc2626"};padding:14px"><div class="stat-val" style="font-size:28px;color:${pc==="green"?"#16a34a":pc==="yellow"?"#d97706":"#dc2626"}">${stats.pct}%</div><div class="stat-lbl">Participação</div></div>
      <div class="stat-card" style="border-top-color:#2563eb;padding:14px"><div class="stat-val" style="color:#2563eb;font-size:28px">${stats.entregues}/${stats.total}</div><div class="stat-lbl">Entregas</div></div>
    </div>
    <div class="progress-bar" style="margin-bottom:6px"><div class="progress-fill" style="width:${stats.pct}%;background:${pc==="green"?"#16a34a":pc==="yellow"?"#d97706":"#dc2626"}"></div></div>
    <div style="color:${pc==="green"?"#16a34a":pc==="yellow"?"#d97706":"#dc2626"};font-weight:700;margin-bottom:18px">${perfLabel(stats.pct)}</div>
    <div class="card-title">Histórico de Atividades</div>
    ${aulasT.length===0?'<div class="empty">Nenhuma aula registrada para esta turma.</div>':aulasT.map(a=>`
      <div style="margin-bottom:10px">
        <div style="font-weight:600;color:#475569;font-size:13px">${fmtData(a.data)} — ${esc(a.conteudo)}</div>
        ${(a.atividades||[]).map(at=>{
          const key=`${a.id}_${at.id}_${al.id}`;
          const entregou=state.entregas[key];
          const meta=state.entregasMeta?.[key];
          return `<div style="padding-left:14px;color:${entregou?"#16a34a":"#dc2626"};font-size:13px;margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
            <span>${entregou?"✔":"❌"} ${esc(at.nome)}</span>
            ${entregou?`<span style="background:#d1fae5;color:#065f46;border-radius:5px;padding:1px 8px;font-size:11px;font-weight:700">🏅 ${meta?.nota??at.pontos} pts</span>`:""}
            ${meta?.data?`<span style="color:#64748b;font-size:11px">📅 ${fmtData(meta.data)}</span>`:""}
            ${meta?.status==="mesmo_dia"?`<span style="background:#d1fae5;color:#065f46;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">🟢 Mesmo dia</span>`:""}
            ${meta?.status==="no_prazo"?`<span style="background:#dbeafe;color:#1d4ed8;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">🔵 No prazo</span>`:""}
            ${meta?.status==="atraso"?`<span style="background:#fee2e2;color:#991b1b;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">🔴 Atrasado</span>`:""}

}

function setAulaDisc(d){ state.selectedDisc=d; renderPage("aulas"); }
function setAulaTurma(t){ state.selectedTurma=t||"todas"; renderPage("aulas"); }
function setAulaFiltro(f){ state.aulaFiltroTipo=f; renderPage("aulas"); }
function setAulaBusca(v){ state.aulaBusca=v; renderPage("aulas"); }

function toggleAulaCard(id){
  const body=document.getElementById("aula-body-"+id);
  const icon=document.getElementById("exp-icon-"+id);
  if(!body) return;
  const open=body.style.display!=="none";
  body.style.display=open?"none":"block";
  icon.textContent=open?"▼":"▲";
}

function toggleEntrega(aulaId,atId,alunoId,turma,pontos){
  // normalizar sempre como string para a chave
  const key=`${aulaId}_${atId}_${alunoId}`;
  if(state.entregas[key]){
    delete state.entregas[key];
    delete state.entregasMeta[key];
    showToast("↩️ Entrega removida");
    renderPage(state.currentPage);
  } else {
    abrirModalEntrega(String(aulaId),String(atId),String(alunoId),turma,pontos);
  }
}

function abrirModalEntrega(aulaId,atId,alunoId,turma,pontosDefault){
  const aula=state.aulas.find(a=>String(a.id)===String(aulaId));
  const at=aula?.atividades?.find(a=>String(a.id)===String(atId));
  const al=(state.alunos[turma]||[]).find(a=>String(a.id)===String(alunoId));
  if(!document.getElementById("me-titulo")){showToast("Erro: modal não encontrado");return;}

  document.getElementById("me-titulo").textContent=`✅ Registrar Entrega — ${al?.nome||"Aluno"}`;
  document.getElementById("me-atividade").textContent=`${at?.nome||"Atividade"} · Aula de ${fmtData(aula?.data||"")}`;
  document.getElementById("me-data").value=hoje();
  document.getElementById("me-obs").value="";
  document.getElementById("me-prazo-edit").value=at?.prazo||"";

  // guardar referência da atividade para calcularPontuacao
  state._pendEntrega={aulaId:String(aulaId),atId:String(atId),alunoId:String(alunoId),turma};
  state._pendAt=at;

  // info do prazo
  const prazoInfo=document.getElementById("me-prazo-info");
  if(at?.prazo){
    prazoInfo.innerHTML=`📅 Prazo da atividade: <strong>${fmtData(at.prazo)}</strong> &nbsp;·&nbsp; 🟢 ${at.ptsDia||3}pts no dia &nbsp;·&nbsp; 🔵 ${at.ptsPrazo||2}pts no prazo &nbsp;·&nbsp; 🔴 ${at.ptsAtraso||1}pts após o prazo`;
    prazoInfo.style.display="block";
  } else {
    prazoInfo.innerHTML=`⚠️ Esta atividade não tem prazo definido. Defina abaixo ou atribua a pontuação manualmente.`;
    prazoInfo.style.color="#92400e"; prazoInfo.style.background="#fffbeb"; prazoInfo.style.borderColor="#fcd34d";
    prazoInfo.style.display="block";
  }

  calcularPontuacao();
  document.getElementById("modal-entrega").classList.add("open");
}

function calcularPontuacao(){
  const at=state._pendAt;
  const dataEntrega=document.getElementById("me-data").value;
  const prazoEdit=document.getElementById("me-prazo-edit").value;
  const prazo=prazoEdit||at?.prazo||"";
  const aula=state.aulas.find(a=>String(a.id)===String(state._pendEntrega?.aulaId));
  const dataAula=aula?.data||"";

  const ptsDia=at?.ptsDia||3;
  const ptsPrazo=at?.ptsPrazo||2;
  const ptsAtraso=at?.ptsAtraso||1;

  let notaSugerida=ptsPrazo;
  let status=""; let statusCor="";

  if(dataEntrega && prazo){
    if(dataEntrega===dataAula){ notaSugerida=ptsDia; status=`🟢 Mesmo dia da aula! +${ptsDia} pts`; statusCor="#16a34a"; }
    else if(dataEntrega<=prazo){ notaSugerida=ptsPrazo; status=`🔵 Dentro do prazo. +${ptsPrazo} pts`; statusCor="#2563eb"; }
    else { notaSugerida=ptsAtraso; status=`🔴 Após o prazo. +${ptsAtraso} pts`; statusCor="#dc2626"; }
  } else if(dataEntrega && dataAula && dataEntrega===dataAula){
    notaSugerida=ptsDia; status=`🟢 Mesmo dia da aula! +${ptsDia} pts`; statusCor="#16a34a";
  }

  document.getElementById("me-nota").value=notaSugerida;

  const sug=document.getElementById("me-pts-sugestao");
  if(status){
    sug.innerHTML=`<div style="background:${statusCor}1a;border:1.5px solid ${statusCor}55;border-radius:9px;padding:10px 14px;font-weight:700;font-size:14px;color:${statusCor};width:100%">${status}</div>`;
  } else {
    sug.innerHTML=`<div style="display:flex;gap:6px;width:100%">
      <div style="flex:1;text-align:center;background:#d1fae5;border-radius:8px;padding:8px;font-size:12px;font-weight:700;color:#065f46">🟢 Mesmo dia<br>${ptsDia} pts</div>
      <div style="flex:1;text-align:center;background:#dbeafe;border-radius:8px;padding:8px;font-size:12px;font-weight:700;color:#1d4ed8">🔵 No prazo<br>${ptsPrazo} pts</div>
      <div style="flex:1;text-align:center;background:#fee2e2;border-radius:8px;padding:8px;font-size:12px;font-weight:700;color:#991b1b">🔴 Após prazo<br>${ptsAtraso} pts</div>
    </div>`;
  }
}

function confirmarEntrega(){
  const p=state._pendEntrega;
  if(!p||!p.aulaId){showToast("Erro: dados não encontrados");return;}
  const key=`${p.aulaId}_${p.atId}_${p.alunoId}`;
  const nota=Number(document.getElementById("me-nota").value)||0;
  const dataEnt=document.getElementById("me-data").value;
  const obs=document.getElementById("me-obs").value.trim();
  const prazoEdit=document.getElementById("me-prazo-edit").value;

  // atualizar prazo da atividade se foi editado
  if(prazoEdit){
    const aula=state.aulas.find(a=>String(a.id)===String(p.aulaId));
    if(aula){
      const at=aula.atividades?.find(a=>String(a.id)===String(p.atId));
      if(at) at.prazo=prazoEdit;
    }
  }

  // calcular status automaticamente
  const aula=state.aulas.find(a=>String(a.id)===String(p.aulaId));
  const at=aula?.atividades?.find(a=>String(a.id)===String(p.atId));
  const prazoFinal=prazoEdit||at?.prazo||"";
  let statusEntrega="manual";
  if(dataEnt && prazoFinal){
    if(dataEnt===aula?.data) statusEntrega="mesmo_dia";
    else if(dataEnt<=prazoFinal) statusEntrega="no_prazo";
    else statusEntrega="atraso";
  } else if(dataEnt && aula?.data && dataEnt===aula?.data){
    statusEntrega="mesmo_dia";
  }

  state.entregas[key]=true;
  if(!state.entregasMeta) state.entregasMeta={};
  state.entregasMeta[key]={nota,data:dataEnt,obs,status:statusEntrega};
  state._pendEntrega=null; state._pendAt=null;

  const statusLabel={mesmo_dia:"🟢 Mesmo dia",no_prazo:"🔵 No prazo",atraso:"🔴 Após o prazo",manual:"✅"}[statusEntrega];
  document.getElementById("modal-entrega").classList.remove("open");
  showToast(`${statusLabel} Entrega registrada! 🏅 ${nota} pts`);
  renderPage(state.currentPage);
  autoSave();
}

// ─── CALENDÁRIO ──────────────────────────────────────────────────────────────
function renderCalendario(){
  const {y,m}=state.calDate;
  const primeiro=new Date(y,m,1).getDay();
  const diasMes=new Date(y,m+1,0).getDate();
  const strDia=d=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const aulasNoDia=d=>state.aulas.filter(a=>a.data===strDia(d));
  const sel=state.selectedDay;
  const dayAulas=sel?state.aulas.filter(a=>a.data===strDia(sel)):[];

  let cells="";
  for(let i=0;i<primeiro;i++) cells+=`<div></div>`;
  for(let d=1;d<=diasMes;d++){
    const str=strDia(d);
    const aulasD=aulasNoDia(d);
    const isHoje=str===hoje();
    const isSel=sel===d;
    const isFer=!!FERIADOS[str];
    cells+=`<div class="cal-day ${isHoje?"hoje":""} ${isSel?"selecionado":""} ${isFer?"feriado":""}" onclick="selDay(${d})">
      <div class="cal-day-num">${d}</div>
      ${isFer?`<div style="font-size:9px;color:#92400e;font-weight:600">${esc(FERIADOS[str].substring(0,8))}</div>`:""}
      <div class="cal-dots">${aulasD.map(a=>`<div class="cal-dot" style="background:${a.disciplina==="Inteligência Artificial"?"#7c3aed":"#0d9488"}"></div>`).join("")}</div>
    </div>`;
  }

  return `
  <div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <div class="cal-month">${MESES[m]} ${y}</div>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">
      ${DIAS_SEMANA.map(d=>`<div class="cal-day-lbl">${d}</div>`).join("")}
      ${cells}
    </div>
    <div class="legend-row">
      <div class="legend-item"><div class="cal-dot" style="background:#0d9488;width:12px;height:12px"></div> Ed. Física</div>
      <div class="legend-item"><div class="cal-dot" style="background:#7c3aed;width:12px;height:12px"></div> Inteligência Artificial</div>
      <div class="legend-item"><div style="width:12px;height:12px;border-radius:3px;background:#fffbeb;border:2px solid #fcd34d"></div> Feriado</div>
      <div class="legend-item"><div style="width:12px;height:12px;border-radius:3px;background:#dbeafe;border:2px solid #2563eb"></div> Hoje</div>
    </div>
  </div>
  ${sel?`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px">
      <div class="card-title" style="margin:0">📅 ${diaSemana(strDia(sel))}, ${fmtData(strDia(sel))}</div>
      <button class="btn btn-primary btn-sm" onclick="openModalAula()">+ Registrar Aula</button>
    </div>
    ${dayAulas.length===0?'<div class="empty">Nenhuma aula registrada neste dia.</div>':dayAulas.map(a=>`
      <div class="aula-item-row">
        <span class="${a.disciplina==="Inteligência Artificial"?"badge-ia":"badge-ef"}">${a.disciplina==="Inteligência Artificial"?"IA":"EF"}</span>
        <div>
          <div style="font-weight:700;font-size:14px">${esc(a.turma)} — ${esc(a.tipo)}</div>
          <div style="color:#64748b;font-size:13px">${esc(a.conteudo)}</div>
          <div style="color:#94a3b8;font-size:12px">📝 ${a.atividades?.length||0} atividade(s)</div>
        </div>
      </div>`).join("")}
  </div>`:""}`;
}

function selDay(d){ state.selectedDay=state.selectedDay===d?null:d; renderPage("calendario"); }
function calNav(dir){
  let {y,m}=state.calDate;
  m+=dir;
  if(m<0){m=11;y--;}
  if(m>11){m=0;y++;}
  state.calDate={y,m};
  state.selectedDay=null;
  renderPage("calendario");
}

function excluirAtividade(aulaId, atId, ev){
  if(ev) ev.stopPropagation();
  if(!confirm("🗑️ Excluir esta atividade? As entregas registradas também serão removidas.")) return;
  const aula = state.aulas.find(a=>String(a.id)===String(aulaId));
  if(!aula) return;
  // remove atividade
  aula.atividades = (aula.atividades||[]).filter(a=>String(a.id)!==String(atId));
  // remove entregas relacionadas
  Object.keys(state.entregas).forEach(k=>{ if(k.startsWith(`${aulaId}_${atId}_`)) delete state.entregas[k]; });
  Object.keys(state.entregasMeta||{}).forEach(k=>{ if(k.startsWith(`${aulaId}_${atId}_`)) delete state.entregasMeta[k]; });
  showToast("🗑️ Atividade excluída!");
  renderPage(state.currentPage);
  autoSave();
}

  state.config.pontuacaoPadrao=Number(document.getElementById("cfg-pts").value)||2;

function gdStatus(msg, tipo="info"){
  const el=document.getElementById("gd-status");
  if(!el) return;
  const cores={info:"#475569",ok:"#15803d",erro:"#dc2626",sync:"#2563eb"};

// ─── DATA LAYER ──────────────────────────────────────────────────────────────
const CHAVE = "samuelclass_v1";
let db = null;
let auth = null;
let currentUser = null;

function getDados(){
  return {
    aulas: state.aulas,
    alunos: state.alunos,
    entregas: state.entregas,
    entregasMeta: state.entregasMeta || {},
    mediaTrimestral: state.mediaTrimestral || {},
    config: state.config,
    savedAt: new Date().toISOString()
  };
}

function aplicarDados(d){
  if(!d) return;
  if(d.aulas) state.aulas = d.aulas;
  if(d.entregas) state.entregas = d.entregas;
  if(d.entregasMeta) state.entregasMeta = d.entregasMeta;
  if(d.mediaTrimestral) state.mediaTrimestral = d.mediaTrimestral;
  if(d.config) state.config = d.config;
  // alunos com versionamento
  const savedVer = localStorage.getItem("samuelclass_version");
  if(savedVer === DATA_VERSION && d.alunos){
    TURMAS.forEach(t=>{if(!d.alunos[t]||!d.alunos[t].length) d.alunos[t]=ALUNOS_INICIAIS[t]||[];});
    state.alunos = d.alunos;
  } else {
    state.alunos = JSON.parse(JSON.stringify(ALUNOS_INICIAIS));
    localStorage.setItem("samuelclass_version", DATA_VERSION);
  }
}

function _salvarLocal(){
  try{
    localStorage.setItem(CHAVE, JSON.stringify(getDados()));
    return true;
  }catch(e){ return false; }
}

function _carregarLocal(){
  try{
    const raw = localStorage.getItem(CHAVE);
    if(!raw || raw==="{}") return false;
    aplicarDados(JSON.parse(raw));
    return true;
  }catch(e){ return false; }
}

async function _salvarFirebase(){
  if(!db || !currentUser) return false;
  try{
    await db.collection("usuarios").doc(currentUser.uid).set(getDados());
    return true;
  }catch(e){ console.log("Firebase save error:",e); return false; }
}

async function _carregarFirebase(){
  if(!db || !currentUser) return false;
  try{
    const doc = await db.collection("usuarios").doc(currentUser.uid).get();
    if(!doc.exists) return false;
    aplicarDados(doc.data());
    _salvarLocal();
    return true;
  }catch(e){ console.log("Firebase load error:",e); return false; }
}

function renderPublico(){
  // carregar dados locais para exibir no público
  _carregarLocal();

  const ranking=[];
  TURMAS.forEach(t=>{
    (state.alunos[t]||[]).forEach(al=>{
      const pts=getPts(al.id);
      if(pts>0) ranking.push({nome:al.nome,turma:t,pts});
    });
  });
  ranking.sort((a,b)=>b.pts-a.pts);
  const top4=ranking.slice(0,4);

  // turma destaque (maior % entrega)
  let turmaDestaque={turma:"—",pct:0};
  TURMAS.forEach(t=>{
    const als=state.alunos[t]||[];
    if(!als.length) return;
    const totalAts=state.aulas.filter(a=>a.turma===t).reduce((s,a)=>s+(a.atividades?.length||0),0);
    if(!totalAts) return;
    const entregues=als.reduce((s,al)=>{
      let e=0;
      state.aulas.filter(a=>a.turma===t).forEach(a=>(a.atividades||[]).forEach(at=>{
        if(state.entregas[`${a.id}_${at.id}_${al.id}`]) e++;
      }));
      return s+e;
    },0);
    const pct=Math.round((entregues/(als.length*totalAts))*100);
    if(pct>turmaDestaque.pct) turmaDestaque={turma:t,pct};
  });

  // aluno que mais evoluiu (mais entregas recentes - últimos 7 dias)
  const hoje7=new Date(); hoje7.setDate(hoje7.getDate()-7);
  const evoluiu={nome:"—",turma:"",pts:0};
  TURMAS.forEach(t=>{
    (state.alunos[t]||[]).forEach(al=>{
      let pts=0;
      state.aulas.forEach(a=>(a.atividades||[]).forEach(at=>{
        const meta=state.entregasMeta?.[`${a.id}_${at.id}_${al.id}`];
        if(meta?.data && new Date(meta.data)>hoje7) pts+=(meta.pontos||0);
      }));
      if(pts>evoluiu.pts){evoluiu.nome=al.nome;evoluiu.turma=t;evoluiu.pts=pts;}
    });
  });

  const mediaGeral=ranking.length?Math.round(ranking.reduce((s,a)=>s+a.pts,0)/ranking.length):0;
  const medals=["🥇","🥈","🥉","4️⃣"];

  document.getElementById("pub-content").innerHTML=`
    <div class="pub-grid">
      <div class="pub-card">
        <div class="pub-card-icon">👥</div>
        <div class="pub-card-val">${Object.values(state.alunos).reduce((s,a)=>s+a.length,0)}</div>
        <div class="pub-card-lbl">Alunos</div>
      </div>
      <div class="pub-card">
        <div class="pub-card-icon">📚</div>
        <div class="pub-card-val">${state.aulas.length}</div>
        <div class="pub-card-lbl">Aulas</div>
      </div>
      <div class="pub-card">
        <div class="pub-card-icon">📊</div>
        <div class="pub-card-val">${mediaGeral}</div>
        <div class="pub-card-lbl">Média Pts</div>
      </div>
      <div class="pub-card">
        <div class="pub-card-icon">✅</div>
        <div class="pub-card-val">${Object.values(state.entregas).filter(Boolean).length}</div>
        <div class="pub-card-lbl">Entregas</div>
      </div>
    </div>

    ${turmaDestaque.pct>0?`
    <div class="pub-turma-dest">
      <div style="color:#fbbf24;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">🔥 Turma Destaque</div>
      <div style="color:#fff;font-size:16px;font-weight:700">${esc(turmaDestaque.turma)}</div>
      <div style="color:rgba(255,255,255,.6);font-size:12px">${turmaDestaque.pct}% de participação</div>
    </div>`:""}

    ${evoluiu.nome!=="—"?`
    <div class="pub-turma-dest" style="background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.08));border-color:rgba(99,102,241,.3)">
      <div style="color:#a78bfa;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">⭐ Aluno que Mais Evoluiu</div>
      <div style="color:#fff;font-size:15px;font-weight:700">${esc(evoluiu.nome)}</div>
      <div style="color:rgba(255,255,255,.6);font-size:12px">${esc(evoluiu.turma)} · +${evoluiu.pts} pts esta semana</div>
    </div>`:""}

    <div class="pub-ranking">
      <div class="pub-ranking-title">🏆 Top 4 do Mês</div>
      ${top4.length===0?'<div style="color:rgba(255,255,255,.4);font-size:13px;text-align:center">Nenhuma pontuação ainda</div>':
        top4.map((al,i)=>`
        <div class="pub-aluno">
          <div class="pub-medal">${medals[i]}</div>
          <div class="pub-nome">${esc(al.nome)}</div>
          <div class="pub-pts">🏅 ${al.pts}</div>
        </div>`).join("")}
    </div>

    <div style="text-align:center;color:rgba(255,255,255,.3);font-size:10px;padding-bottom:8px">
      Atualizado em ${new Date().toLocaleString("pt-BR")}
    </div>`;
}

const DATA_VERSION = "2026v1";

function _carregarLocal(){
  try{
    const raw=localStorage.getItem(CHAVE);
    if(!raw||raw==="{}") return false;
    const d=JSON.parse(raw);
    if(d.aulas) state.aulas=d.aulas;
    if(d.entregas) state.entregas=d.entregas;
    if(d.entregasMeta) state.entregasMeta=d.entregasMeta;
    if(d.config) state.config=d.config;
    // verificar versão dos alunos — se desatualizada, resetar para lista 2026
    const savedVer = localStorage.getItem("samuelclass_version");
    if(savedVer === DATA_VERSION && d.alunos){
      // versão correta — manter alunos salvos
      TURMAS.forEach(t=>{if(!d.alunos[t]||!d.alunos[t].length) d.alunos[t]=ALUNOS_INICIAIS[t]||[];});
      state.alunos=d.alunos;
    } else {
      // versão antiga — resetar alunos para lista oficial 2026
      state.alunos = JSON.parse(JSON.stringify(ALUNOS_INICIAIS));
      localStorage.setItem("samuelclass_version", DATA_VERSION);
      // salvar imediatamente com alunos corretos
      _salvarLocal();
    }
    return true;
  }catch(e){ return false; }
}

async function gasSalvar(){
  _salvarLocal();
  if(currentUser && db){
    const ok = await _salvarFirebase();
    gdStatus(ok?"✅ Salvo na nuvem! "+new Date().toLocaleTimeString("pt-BR"):"💾 Salvo localmente", ok?"ok":"info");
    if(ok) showToast("☁️ Dados salvos na nuvem!");
  } else {
    gdStatus("💾 Salvo localmente","ok");
    showToast("💾 Dados salvos!");
  }
}

async function gasCarregar(){
  if(currentUser && db){
    gdStatus("🔄 Carregando da nuvem...","sync");
    const ok = await _carregarFirebase();
    if(ok){ gdStatus("☁️ Dados carregados!","ok"); renderPage(state.currentPage); return; }
  }
  const okLocal = _carregarLocal();
  if(okLocal){ gdStatus("📱 Dados do dispositivo","ok"); renderPage(state.currentPage); }
  else gdStatus("☁️ Nenhum dado encontrado","info");
}

// auto-save após cada ação
function autoSave(){
  _salvarLocal();
  if(currentUser && db) _salvarFirebase();
}
